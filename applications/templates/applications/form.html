{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>{{ action }} Application</h2>
    <form method="post">
        {% csrf_token %}
        <div class="row">
            {% for field in form %}
            <div class="col-md-6 mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">{{ action }}</button>
        <a href="{% url 'application_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

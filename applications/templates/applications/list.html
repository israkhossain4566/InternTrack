{% extends "base.html" %}

{% block content %}
<div>
    <div class="page-heading">
        <div>
            <div class="page-kicker">Pipeline</div>
            <h1 class="page-title">My Applications</h1>
            <p class="page-subtitle">Search, filter, and sort your internship opportunities.</p>
        </div>
        <div class="page-actions">
            <a href="{% url 'application_add' %}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Add Application
            </a>
        </div>
    </div>

    <form method="get" action="{% url 'application_list' %}" class="toolbar-card card-body mb-4" id="application-search-form">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="application-search" class="form-label">Search applications</label>
                <input
                    type="search"
                    id="application-search"
                    name="q"
                    class="form-control"
                    placeholder="Company, job title, or location"
                    value="{{ search_query }}"
                >
            </div>
            <div class="col-md-2">
                <label for="status-filter" class="form-label">Status</label>
                <select id="status-filter" name="status" class="form-select">
                    <option value="">All statuses</option>
                    {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if status_filter == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label for="company-filter" class="form-label">Company</label>
                <select id="company-filter" name="company" class="form-select">
                    <option value="">All companies</option>
                    {% for company in company_options %}
                        <option value="{{ company }}" {% if company_filter == company %}selected{% endif %}>{{ company }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label for="internship-type-filter" class="form-label">Internship Type</label>
                <select id="internship-type-filter" name="internship_type" class="form-select">
                    <option value="">All types</option>
                    {% for internship_type in internship_type_options %}
                        <option value="{{ internship_type }}" {% if internship_type_filter == internship_type %}selected{% endif %}>{{ internship_type }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label for="deadline-filter" class="form-label">Deadline</label>
                <input
                    type="date"
                    id="deadline-filter"
                    name="deadline"
                    class="form-control"
                    value="{{ deadline_filter }}"
                >
            </div>
            <div class="col-md-3">
                <label for="date-applied-filter" class="form-label">Date Applied</label>
                <input
                    type="date"
                    id="date-applied-filter"
                    name="date_applied"
                    class="form-control"
                    value="{{ date_applied_filter }}"
                >
            </div>
            <div class="col-md-3">
                <label for="sort-filter" class="form-label">Sort By</label>
                <select id="sort-filter" name="sort" class="form-select">
                    <option value="">Default order</option>
                    {% for value, label in sort_options %}
                        <option value="{{ value }}" {% if sort_filter == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label for="direction-filter" class="form-label">Direction</label>
                <select id="direction-filter" name="direction" class="form-select">
                    <option value="asc" {% if direction_filter == 'asc' %}selected{% endif %}>Ascending</option>
                    <option value="desc" {% if direction_filter == 'desc' %}selected{% endif %}>Descending</option>
                </select>
            </div>
            <div class="col-12 d-flex flex-wrap gap-2 toolbar-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-funnel me-1"></i>Apply
                </button>
                <a
                    href="{% url 'application_list' %}"
                    id="application-clear"
                    class="btn btn-outline-secondary {% if not search_or_filters_active %}d-none{% endif %}"
                >
                    Clear
                </a>
            </div>
        </div>
    </form>

    <div id="applications-results" aria-live="polite">
        {% include "applications/_application_results.html" %}
    </div>
</div>

<script>
(function () {
    const form = document.getElementById('application-search-form');
    const searchInput = document.getElementById('application-search');
    const results = document.getElementById('applications-results');
    const clearButton = document.getElementById('application-clear');
    let debounceTimer;
    let activeRequest;

    if (!form || !searchInput || !results) {
        return;
    }

    function buildUrl() {
        const params = new URLSearchParams(new FormData(form));

        if (!params.get('sort')) {
            params.delete('direction');
        }

        for (const key of Array.from(params.keys())) {
            const value = params.get(key);
            if (!value || !value.trim()) {
                params.delete(key);
            }
        }

        const queryString = params.toString();
        return queryString ? `${form.action}?${queryString}` : form.action;
    }

    function updateClearButton() {
        if (!clearButton) {
            return;
        }

        const params = new URLSearchParams(new FormData(form));
        if (!params.get('sort')) {
            params.delete('direction');
        }
        const hasActiveInput = Array.from(params.values()).some(value => String(value).trim() !== '');
        clearButton.classList.toggle('d-none', !hasActiveInput);
    }

    function loadApplications(requestedUrl) {
        const url = requestedUrl || buildUrl();

        if (activeRequest) {
            activeRequest.abort();
        }

        activeRequest = new AbortController();
        updateClearButton();

        fetch(url, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            signal: activeRequest.signal
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Could not load applications.');
                }
                return response.text();
            })
            .then(html => {
                results.innerHTML = html;
                window.history.replaceState({}, '', url);
            })
            .catch(error => {
                if (error.name !== 'AbortError') {
                    results.innerHTML = '<div class="alert alert-danger">Could not update applications. Please try again.</div>';
                }
            });
    }

    searchInput.addEventListener('input', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(loadApplications, 300);
    });

    form.addEventListener('submit', function (event) {
        event.preventDefault();
        loadApplications();
    });

    results.addEventListener('click', function (event) {
        const pageLink = event.target.closest('[data-page-link]');

        if (!pageLink) {
            return;
        }

        event.preventDefault();
        loadApplications(pageLink.href);
    });
})();
</script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Delete Application</h2>
    <p>Are you sure you want to delete <strong>{{ app.job_title }}</strong> at <strong>{{ app.company_name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'application_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}

        <div class="card shadow border-0 rounded-3 text-center">
            <div class="card-body p-5">
                <div class="mb-4 text-success" style="font-size: 3rem;">
                    &#10003;

    </div>
</div>
{% endblock %}

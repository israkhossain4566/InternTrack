{% extends "base.html" %}

{% block title %}Password Reset Complete | InternTrack{% endblock %}

{% block content %}
<div class="auth-shell">
    <section class="auth-card">
        <div class="auth-card-body text-center">
            <span class="auth-icon text-success"><i class="bi bi-check2 fs-4"></i></span>
            <h1 class="auth-title">Password Reset Complete</h1>
            <p class="auth-subtitle">Your password has been successfully set. You can log in with the new password now.</p>
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Log In</a>
        </div>
    </section>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Edit Profile | InternTrack{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h4 class="card-title text-primary"><a href="{% url 'profile' %}" class="text-decoration-none">&larr;</a> Edit Profile</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label text-muted">{{ field.label }}</label>
                            {{ field.errors }}
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text text-muted small">{{ field.help_text|safe }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex justify-content-end mt-4">
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

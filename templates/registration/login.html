{% extends "base.html" %}

{% block title %}Login | InternTrack{% endblock %}

{% block content %}
<div class="auth-shell">
    <section class="auth-card">
        <div class="auth-card-body">
            <div class="text-center">
                <span class="auth-icon"><i class="bi bi-box-arrow-in-right fs-4"></i></span>
                <h1 class="auth-title">Log In</h1>
                <p class="auth-subtitle">Access your internship tracking workspace.</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger">Please enter a correct username and password.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-3">
                    <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                    <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                    <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Log In</button>
            </form>
        </div>
    </section>
</div>
{% endblock %}

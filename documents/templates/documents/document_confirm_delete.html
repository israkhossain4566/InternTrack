{% extends "base.html" %}

{% block title %}Delete Document{% endblock %}

{% block content %}
    <div class="card p-4">
        <h1 class="h3">Delete Document</h1>
        <p>Are you sure you want to delete "{{ document.title }}"?</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a class="btn btn-secondary" href="{% url 'documents:document_detail' document.pk %}">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ document.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">{{ document.title }}</h1>
        <a class="btn btn-secondary" href="{% url 'documents:document_list' %}">Back to Documents</a>
    </div>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Document Type</dt>
                <dd class="col-sm-9">{{ document.get_document_type_display }}</dd>

                <dt class="col-sm-3">Version</dt>
                <dd class="col-sm-9">{{ document.version }}</dd>

                <dt class="col-sm-3">Uploaded At</dt>
                <dd class="col-sm-9">{{ document.uploaded_at|date:"M d, Y H:i" }}</dd>

                <dt class="col-sm-3">Last Updated</dt>
                <dd class="col-sm-9">{{ document.updated_at|date:"M d, Y H:i" }}</dd>

                <dt class="col-sm-3">File</dt>
                <dd class="col-sm-9">
                    <a href="{{ document.file.url }}" target="_blank" rel="noopener">Open File</a>
                </dd>
            </dl>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-danger" href="{% url 'documents:document_delete' document.pk %}">Delete Document</a>
    </div>
</main>
</body>
</html>
